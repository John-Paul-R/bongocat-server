<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>WS Log</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: #0e0e0e;
                color: #d4d4d4;
                font-family: "Courier New", monospace;
                font-size: 13px;
                display: flex;
                flex-direction: column;
                height: 100vh;
            }

            #toolbar {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 8px 12px;
                background: #161616;
                border-bottom: 1px solid #2a2a2a;
                flex-shrink: 0;
            }

            #status {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #444;
                flex-shrink: 0;
                transition: background 0.2s;
            }
            #status.connected {
                background: #4ec94e;
                box-shadow: 0 0 6px #4ec94e88;
            }
            #status.disconnected {
                background: #c94e4e;
            }
            #status.connecting {
                background: #c9a84e;
            }

            #url-input {
                flex: 1;
                background: #0e0e0e;
                border: 1px solid #2a2a2a;
                color: #d4d4d4;
                font-family: inherit;
                font-size: 13px;
                padding: 4px 8px;
                border-radius: 3px;
                outline: none;
            }
            #url-input:focus {
                border-color: #555;
            }

            button {
                background: #222;
                border: 1px solid #333;
                color: #ccc;
                font-family: inherit;
                font-size: 12px;
                padding: 4px 10px;
                border-radius: 3px;
                cursor: pointer;
            }
            button:hover {
                background: #2a2a2a;
                border-color: #444;
            }
            button:active {
                background: #1a1a1a;
            }

            #log {
                flex: 1;
                overflow-y: auto;
                padding: 8px 0;
            }

            .entry {
                display: flex;
                gap: 12px;
                padding: 2px 12px;
                line-height: 1.6;
                border-left: 2px solid transparent;
            }
            .entry:hover {
                background: #141414;
            }

            .entry.msg {
                border-left-color: #3a7bd5;
            }
            .entry.open {
                border-left-color: #4ec94e;
                color: #4ec94e;
            }
            .entry.close {
                border-left-color: #c94e4e;
                color: #c94e4e;
            }
            .entry.error {
                border-left-color: #c9614e;
                color: #c9614e;
            }

            .ts {
                color: #555;
                flex-shrink: 0;
                user-select: none;
            }
            .kind {
                flex-shrink: 0;
                width: 5ch;
                color: inherit;
                opacity: 0.7;
            }
            .body {
                word-break: break-all;
                white-space: pre-wrap;
            }

            #empty {
                color: #333;
                text-align: center;
                margin-top: 40px;
            }

            .bongocat-container > img {
                width: 256px;
                height: 256px;
                background-color: red;
            }
        </style>
    </head>
    <body>
        <div id="toolbar">
            <div id="status"></div>
            <input
                id="url-input"
                type="text"
                value="ws://localhost:8080/"
                spellcheck="false"
            />
            <button id="toggle-btn" onclick="toggle()">Connect</button>
            <button onclick="clearLog()">Clear</button>
        </div>
        <div id="bongocat-container">
            <img
                id="bongocat-both-up.png"
                src="assets/bongo-cat-both-up.png"
                alt="Bongo Cat"
            />
            <img
                id="bongocat-left-down.png"
                src="assets/bongo-cat-left-down.png"
                alt="Bongo Cat"
            />
            <img
                id="bongocat-right-down.png"
                src="assets/bongo-cat-right-down.png"
                alt="Bongo Cat"
            />
            <img
                id="bongocat-both-down.png"
                src="assets/bongo-cat-both-down.png"
                alt="Bongo Cat"
            />
        </div>

        <div id="log">
            <div id="empty">no events yet</div>
        </div>

        <script>
            let ws = null;

            function ts() {
                return new Date().toISOString().slice(11, 23);
            }

            function appendEntry(kind, text) {
                const empty = document.getElementById("empty");
                if (empty) empty.remove();

                const log = document.getElementById("log");
                const div = document.createElement("div");
                div.className = `entry ${kind}`;
                div.innerHTML = `<span class="ts">${ts()}</span><span class="kind">${kind}</span><span class="body">${escHtml(text)}</span>`;

                const atBottom =
                    log.scrollHeight - log.scrollTop - log.clientHeight < 40;
                log.appendChild(div);
                if (atBottom) log.scrollTop = log.scrollHeight;
            }

            function escHtml(str) {
                return str
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            function setStatus(state) {
                const el = document.getElementById("status");
                el.className = state;
            }

            function toggle() {
                ws ? disconnect() : connect();
            }

            let bongoRestoreTimeout = {
                left: null,
                right: null,
            };
            /**
             * @param {'left'|'right'} direction
             */
            function bongo(direction) {
                const isLeftVisuallyBongoed =
                    direction === "left" || bongoRestoreTimeout.left;
                const isRightVisuallyBongoed =
                    direction === "right" || bongoRestoreTimeout.right;
                if (bongoRestoreTimeout[direction]) {
                    clearTimeout(bongoRestoreTimeout[direction]);
                }
                bongoRestoreTimeout[direction] = setTimeout(() => {
                    bongoRestoreTimeout[direction] = null;

                    // the direction that was triggered will not count for the
                    // "what to do next" ,as its been disabled, so exclude it.
                    const isLeftVisuallyBongoed =
                        direction !== "left" && bongoRestoreTimeout.left;
                    const isRightVisuallyBongoed =
                        direction !== "right" && bongoRestoreTimeout.right;
                    displayBongo(
                        isLeftVisuallyBongoed && isRightVisuallyBongoed
                            ? "both"
                            : isLeftVisuallyBongoed
                              ? "left"
                              : isRightVisuallyBongoed
                                ? "right"
                                : "neither",
                    );
                }, 150);

                displayBongo(
                    isLeftVisuallyBongoed && isRightVisuallyBongoed
                        ? "both"
                        : isLeftVisuallyBongoed
                          ? "left"
                          : isRightVisuallyBongoed
                            ? "right"
                            : "neither",
                );
            }

            const bongoElements = {
                neither: document.getElementById("bongocat-both-up.png"),
                left: document.getElementById("bongocat-left-down.png"),
                right: document.getElementById("bongocat-right-down.png"),
                both: document.getElementById("bongocat-both-down.png"),
            };
            bongoElements.left.style.display = "none";
            bongoElements.right.style.display = "none";
            bongoElements.both.style.display = "none";
            /**
             * @param {'left' | 'right' | 'both' | 'neither'} frame
             */
            function displayBongo(frame) {
                bongoElements.neither.style.display = "none";
                bongoElements.left.style.display = "none";
                bongoElements.right.style.display = "none";
                bongoElements.both.style.display = "none";
                bongoElements[frame].style.display = "block";
            }

            const bongo_data_pattern = /key pressed \((right|left)\) at (\d+)/;
            function handleBongoMessage(data) {
                const match = bongo_data_pattern.exec(data);
                if (match) {
                    const direction = match[1];
                    const timestamp = match[2];
                    console.log(
                        `Bongo cat pressed ${direction} at ${timestamp}`,
                    );
                    bongo(direction);
                }
            }

            function connect() {
                const url = document.getElementById("url-input").value.trim();
                setStatus("connecting");
                document.getElementById("toggle-btn").textContent =
                    "Connecting…";

                ws = new WebSocket(url);

                ws.onopen = () => {
                    setStatus("connected");
                    document.getElementById("toggle-btn").textContent =
                        "Disconnect";
                    appendEntry("open", `connected to ${url}`);
                };

                ws.onmessage = (e) => {
                    appendEntry("msg", e.data);
                    handleBongoMessage(e.data);
                };

                ws.onclose = (e) => {
                    setStatus("disconnected");
                    document.getElementById("toggle-btn").textContent =
                        "Connect";
                    appendEntry(
                        "close",
                        `closed (code ${e.code}${e.reason ? ": " + e.reason : ""})`,
                    );
                    ws = null;
                };

                ws.onerror = () => appendEntry("error", "websocket error");
            }

            function disconnect() {
                ws?.close();
            }

            function clearLog() {
                const log = document.getElementById("log");
                log.innerHTML = '<div id="empty">no events yet</div>';
            }
        </script>
    </body>
</html>
